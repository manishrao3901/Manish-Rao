  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body {
      min-height:100vh;
      color:white;
      background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)),url('king.png');
      background-size:cover;
      background-position:center;
      background-attachment:fixed;
      overflow-x:hidden;
    body::before {
      content:"";
      position:fixed;
      width:200%;
      height:200%;
      background:radial-gradient(circle,#00ffff33,transparent 70%);
      animation:moveBg 10s linear infinite;
      z-index:-1;
    }

    @keyframes moveBg {
      0% {transform:translate(0,0);} 
      50% {transform:translate(-50px,-50px);} 
      100% {transform:translate(0,0);} 
    }

    header {
      padding:20px;
      text-align:center;
      font-size:32px;
      font-weight:bold;
      background:rgba(0,0,0,0.4);
      backdrop-filter:blur(15px);
      box-shadow:0 0 20px #00ffff;
      letter-spacing:2px;
    }

    .typing {
      border-right:3px solid #00ffff;
      width:fit-content;
      margin:auto;
      overflow:hidden;
      white-space:nowrap;
      animation:typing 4s steps(30,end), blink .7s infinite;
    }

    @keyframes typing {
      from {width:0}
      to {width:100%}
    }

    @keyframes blink {
      50% {border-color:transparent}
    }

    .content {
      display:flex;
      padding:40px;
      flex-wrap:wrap;
      justify-content:center;
      gap:25px;
    }

    .card {
      width:360px;
      height: 200px;
      padding:40px;
      border-radius:30px;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(25px);
      box-shadow:0 0 25px rgba(0,255,255,0.3);
      transition:0.4s;
      position:relative;
      overflow:hidden;
    }

    .card::before {
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
      top:0;
      left:-100%;
      transition:0.6s;
    }

    .card:hover::before {left:100%;}

    .card:hover {
      transform:translateY(-15px) scale(1.07);
      box-shadow:0 0 30px #00ffff;
    }

    .card a {
      display:inline-block;
      margin-top:12px;
      padding:8px 15px;
      border-radius:8px;
      background:#00ffff;
      color:black;
      font-weight:bold;
      text-decoration:none;
    }

    .card a:hover {
      background:#00ff99;
      box-shadow:0 0 10px #00ffff;
    }

    footer {
      text-align:center;
      padding:15px;
      background:rgba(0,0,0,0.4);
      margin-top:40px;
    }
    .btn-group {
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-top:15px;
}

.btn-group a {
  flex:1;
  text-align:center;
  padding:10px;
  border-radius:10px;
  background:#00ffff;
  color:black;
  font-weight:bold;
  text-decoration:none;
  transition:0.3s;
}

.btn-group a:hover {
  background:#00ff99;
  box-shadow:0 0 10px #00ffff;
}
  </style>
</head>
