<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study PDF Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 20px;
      background: #1e293b;
      margin: 0;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      margin: 15px auto;
      padding: 15px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      border: none;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .btn:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

  <h1>📚 Study PDF Hub</h1>

  <div class="container">

    <div class="card">
      <h3>Physics PDF 1</h3>
      <iframe src="phy1.pdf"></iframe>
      <br>
      <a href="phy1.pdf" download class="btn">⬇ Download</a>
    </div>

    <div class="card">
      <h3>Physics PDF 2</h3>
      <iframe src="phy2.pdf"></iframe>
      <br>
      <a href="phy2.pdf" download class="btn">⬇ Download</a>
    </div>

    <div class="card">
      <h3>Physics PDF 3</h3>
      <iframe src="phy3.pdf"></iframe>
      <br>
      <a href="phy3.pdf" download class="btn">⬇ Download</a>
    </div>

    <div class="card">
      <h3>Physics PDF 4</h3>
      <iframe src="phy4.pdf"></iframe>
      <br>
      <a href="phy4.pdf" download class="btn">⬇ Download</a>
    </div>

  </div>

</body>
</html>
